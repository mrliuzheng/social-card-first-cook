<script>
(function(){
  var dots = document.querySelectorAll('.page-dot a');
  var slides = document.querySelectorAll('.slide');
  if(!dots.length) return;
  // Click to scroll to slide
  dots.forEach(function(d,i){
    d.addEventListener('click',function(e){
      e.preventDefault();
      slides[i].scrollIntoView({behavior:'smooth',block:'start'});
    });
  });
  // Active highlight on scroll 鈥?use intersection ratio
  function update(){
    var maxVis = -1, idx = 0;
    for(var i=0;i<slides.length;i++){
      var r = slides[i].getBoundingClientRect();
      var vis = Math.min(r.bottom, window.innerHeight) - Math.max(r.top, 0);
      if(vis > maxVis){ maxVis = vis; idx = i; }
    }
    dots.forEach(function(d,j){ d.classList.toggle('active',j===idx); });
  }
  window.addEventListener('scroll',update,{passive:true});
  update();
})();
</script>
